# ==========================================
# JobSpyde — CI Pipeline
# ==========================================
# Runs on every push and PR. Validates code quality and builds.

name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # Lint & Build — Next.js Web App
  # ================================
  web:
    name: Web (Lint & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build
          NEXT_PUBLIC_AGENT_URL: http://localhost:8000

  # ================================
  # Lint & Test — Python Agent
  # ================================
  agent:
    name: Agent (Lint & Validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/agent/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile app/config.py
          python -m py_compile app/database.py
          python -m py_compile services/redis.py
          python -m py_compile services/supabase.py

      - name: Validate imports
        run: |
          python -c "from fastapi import FastAPI; print('FastAPI OK')"
          python -c "from pydantic import BaseModel; print('Pydantic OK')"
          python -c "import redis; print('Redis OK')"

  # ================================
  # Docker Build Check
  # ================================
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [web, agent]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web Image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: false
          tags: jobspyde-web:test
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-key
            NEXT_PUBLIC_AGENT_URL=http://agent:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent Image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/agent
          push: false
          tags: jobspyde-agent:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate production compose file
        run: docker compose -f docker-compose.prod.yml config > /dev/null
