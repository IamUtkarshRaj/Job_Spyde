# ==========================================
# JobSpyde — Deploy to Production (AWS EC2)
# ==========================================
# Triggers: Push to 'main' branch (after CI passes)
# Pipeline: Build images → Push to GHCR → SSH deploy to EC2

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a running deploy

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/jobspyde-web
  AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/jobspyde-agent

jobs:
  # ================================
  # Build & Push Docker Images
  # ================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Build Web Image ----------
      - name: Build & Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_AGENT_URL=http://agent:8000
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      # ---------- Build Agent Image ----------
      - name: Build & Push Agent Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/agent
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

  # ================================
  # Deploy to EC2
  # ================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            
            APP_DIR="/opt/jobspyde"
            cd "$APP_DIR"
            
            echo "=== Pulling latest code ==="
            git pull origin main
            
            echo "=== Logging into GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            echo "=== Pulling latest images ==="
            docker pull ${{ env.WEB_IMAGE }}:latest
            docker pull ${{ env.AGENT_IMAGE }}:latest
            
            echo "=== Writing environment file ==="
            cat > .env <<'ENVEOF'
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_USE_SSL=true
            CORS_ORIGINS=http://${{ secrets.EC2_HOST }},https://${{ secrets.EC2_HOST }}
            ENVIRONMENT=production
            GHCR_IMAGE_WEB=${{ env.WEB_IMAGE }}:latest
            GHCR_IMAGE_AGENT=${{ env.AGENT_IMAGE }}:latest
            ENVEOF
            
            echo "=== Deploying with Docker Compose ==="
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            
            echo "=== Cleaning up old images ==="
            docker image prune -af
            
            echo "=== Waiting for services to be healthy ==="
            sleep 30
            
            echo "=== Health Check ==="
            docker compose -f docker-compose.prod.yml ps
            
            # Verify services are running
            curl -sf http://localhost/api/agent/health || echo "WARNING: Agent health check failed"
            curl -sf http://localhost/ > /dev/null || echo "WARNING: Web health check failed"
            
            echo "=== Deploy Complete ==="

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Container Status ==="
            docker compose -f /opt/jobspyde/docker-compose.prod.yml ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
            
            echo ""
            echo "=== Recent Logs (last 20 lines) ==="
            docker compose -f /opt/jobspyde/docker-compose.prod.yml logs --tail=20

      - name: Deployment notification
        if: failure()
        run: |
          echo "::error::Deployment failed! Check the logs above for details."
          echo "You may need to SSH into the EC2 instance and run:"
          echo "  docker compose -f /opt/jobspyde/docker-compose.prod.yml logs"
