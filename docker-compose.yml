# ==========================================
# JobSpyde — Development Docker Compose
# ==========================================
# Usage: docker compose up --build
# This is for LOCAL DEVELOPMENT only. For production, use docker-compose.prod.yml
#
# All services read from the single root .env file.

services:
  agent:
    build: ./apps/agent
    ports:
      - "8000:8000"
    volumes:
      - ./apps/agent:/app  # Hot reload — mount source code
    env_file:
      - .env
    environment:
      - PLAYWRIGHT_HEADLESS=true
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000
      - NEXT_PUBLIC_AGENT_URL=http://agent:8000
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_AGENT_URL: http://agent:8000
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_AGENT_URL=http://agent:8000
    restart: unless-stopped
    depends_on:
      - agent

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data:
