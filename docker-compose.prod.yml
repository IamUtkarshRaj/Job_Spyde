# ==========================================
# JobSpyde — Production Docker Compose
# ==========================================
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Services: nginx (reverse proxy) → web (Next.js) + agent (FastAPI) + redis
# SSL: Initially HTTP-only. Run infra/scripts/ssl-init.sh after deploying to enable HTTPS.
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in real values
#   2. Ensure Docker and Docker Compose are installed

services:
  # ======================
  # Nginx Reverse Proxy
  # ======================
  nginx:
    image: nginx:1.25-alpine
    container_name: jobspyde-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
      agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jobspyde-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ======================
  # Next.js Frontend
  # ======================
  web:
    image: ${GHCR_IMAGE_WEB:-ghcr.io/iamutkarshraj/jobspyde-web:latest}
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_AGENT_URL: /api/agent
    container_name: jobspyde-web
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_AGENT_URL=/api/agent
    restart: unless-stopped
    networks:
      - jobspyde-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ======================
  # FastAPI Agent Service
  # ======================
  agent:
    image: ${GHCR_IMAGE_AGENT:-ghcr.io/iamutkarshraj/jobspyde-agent:latest}
    build:
      context: ./apps/agent
    container_name: jobspyde-agent
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - PLAYWRIGHT_HEADLESS=true
      - CORS_ORIGINS=http://localhost,http://localhost:3000,http://web:3000
      - REDIS_USE_SSL=true
    restart: unless-stopped
    networks:
      - jobspyde-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ======================
  # Redis (local cache/dev fallback)
  # ======================
  redis:
    image: redis:7-alpine
    container_name: jobspyde-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - jobspyde-net
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  certbot_webroot:
  certbot_certs:

networks:
  jobspyde-net:
    driver: bridge
