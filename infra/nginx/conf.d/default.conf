# ==========================================
# JobSpyde — HTTP Site Configuration
# ==========================================
# This is the initial HTTP-only config (no domain/SSL).
# When you get a domain, replace this with ssl.conf.template content.

server {
    listen 80;
    server_name _;

    # Certbot ACME challenge (for future SSL setup)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---------- Agent API ----------
    # Proxy /api/agent/* → FastAPI agent service
    location /api/agent/ {
        limit_req zone=api_limit burst=20 nodelay;

        # Strip /api/agent prefix and forward to agent backend
        rewrite ^/api/agent/(.*)$ /$1 break;

        proxy_pass http://agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support (for job discovery streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------- Health Check (agent direct) ----------
    location /health {
        proxy_pass http://agent_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---------- Next.js Frontend ----------
    location / {
        limit_req zone=general_limit burst=50 nodelay;

        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR / WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # ---------- Static assets caching ----------
    location /_next/static/ {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon
    location /favicon.ico {
        proxy_pass http://web_backend;
        expires 30d;
        access_log off;
    }
}
